<div class="bg-[#F8F9FA] min-h-screen font-body">
    <app-header></app-header>

    <main class="pt-32 pb-20 flex items-center justify-center px-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-xl border border-outline-variant/20 p-8 md:p-10">
            <div class="text-center mb-10">
                <h2 class="text-headline-md font-bold text-navy mb-2">Đăng nhập</h2>
                <p class="text-on-surface-variant text-body-sm">Chào mừng bạn quay lại với Tân Xuân Phúc</p>
            </div>

            <form (ngSubmit)="onLogin()" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-label-sm text-on-surface-variant font-bold">Số điện thoại / Email</label>
                    <input type="text" placeholder="Nhập số điện thoại hoặc email" 
                        class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-xl text-body-md focus:outline-none focus:border-primary transition-all">
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-label-sm text-on-surface-variant font-bold">Mật khẩu</label>
                        <a href="#" class="text-[11px] text-primary font-bold hover:underline">Quên mật khẩu?</a>
                    </div>
                    <input type="password" placeholder="Nhập mật khẩu" 
                        class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-xl text-body-md focus:outline-none focus:border-primary transition-all">
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-title-md shadow-lg shadow-primary/20 hover:bg-primary-hover transition-all">
                        Đăng nhập
                    </button>
                </div>
            </form>

            <div class="mt-10 text-center">
                <p class="text-body-sm text-on-surface-variant">
                    Bạn chưa có tài khoản? 
                    <a href="#" class="text-secondary font-bold hover:underline ml-1">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </main>

    <app-footer></app-footer>
</div>
