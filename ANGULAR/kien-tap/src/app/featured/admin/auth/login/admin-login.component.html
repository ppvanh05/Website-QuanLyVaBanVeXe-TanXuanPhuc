<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="/asset/images/admin/TXP_logo2.png" alt="TXP Logo" class="logo">
      <h2>Đăng Nhập Quản Trị</h2>
      <p>Dành riêng cho nhân viên và quản trị viên</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Tài khoản hoặc Email</label>
        <div class="input-wrapper">
          <span class="material-icons">person</span>
          <input 
            type="text" 
            id="email" 
            formControlName="email" 
            class="form-control" 
            [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" 
            placeholder="Nhập tên đăng nhập hoặc email"
          />
        </div>
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Vui lòng nhập tài khoản hoặc email</div>
        </div>
      </div>

      <div class="form-group">
        <label for="matKhau">Mật khẩu</label>
        <div class="input-wrapper">
          <span class="material-icons">lock</span>
          <input 
            type="password" 
            id="matKhau" 
            formControlName="matKhau" 
            class="form-control" 
            [ngClass]="{ 'is-invalid': submitted && f['matKhau'].errors }" 
            placeholder="Nhập mật khẩu"
          />
        </div>
        <div *ngIf="submitted && f['matKhau'].errors" class="invalid-feedback">
          <div *ngIf="f['matKhau'].errors['required']">Vui lòng nhập mật khẩu</div>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">
        <span class="material-icons">error_outline</span> {{ error }}
      </div>

      <button [disabled]="loading" class="btn btn-primary btn-block">
        <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1"></span>
        Đăng nhập
      </button>

      <div class="back-link">
        <a routerLink="/home">Quay lại trang khách hàng</a>
      </div>
    </form>
  </div>
</div>
